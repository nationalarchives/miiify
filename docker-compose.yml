version: "3"

services:
  miiify:
    image: jptmoore/miiify:latest
    build: .
    command:
      - "--repository"
      - "${MIIIFY_REPOSITORY:-db-pack}"
      - "--port"
      - "${MIIIFY_PORT:-10000}"
      - "--page-limit"
      - "${MIIIFY_PAGE_LIMIT:-200}"
      - "--base-url"
      - "${MIIIFY_BASE_URL:-http://localhost:10000}"
    ports:
      - "${MIIIFY_PORT:-10000}:${MIIIFY_PORT:-10000}"
    volumes:
      - miiify_data:/home/miiify/db-pack
    restart: always

volumes:
  miiify_data:
